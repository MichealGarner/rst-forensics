name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with test + capture extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,all]"

      - name: Regenerate Phase 3 fixture pcaps
        # The fixture pcaps are deterministic — building them in CI keeps the
        # repo lean and means the test asserts against freshly-built bytes.
        run: python tests/fixtures/build_fixtures.py

      - name: Run pytest
        run: pytest -q
